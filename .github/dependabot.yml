version: 2
updates:
  # Backend Go modules
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  # Frontend npm packages
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Base images in the Dockerfiles
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
