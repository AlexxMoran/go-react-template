services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-goapp}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-goapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
      target: migrate
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-goapp}?sslmode=disable
    command: ["up"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend
      target: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      # The Vite dev server proxies /api to the Go backend over the compose network.
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    depends_on:
      - api

volumes:
  db-data:
