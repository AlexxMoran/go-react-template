name: Frontend

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  check:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  contract:
    name: OpenAPI contract drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Regenerate the typed client from the backend spec (../backend/api) and
      # fail if it differs from what is committed — the frontend half of the
      # contract drift guard (the backend half is test/integration/openapi_test.go).
      - name: Regenerate client from the OpenAPI spec
        run: npm run gen:api

      - name: Fail if the generated client is out of date
        run: git diff --exit-code src/shared/api/schema.d.ts
