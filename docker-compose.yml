services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      # Host port is overridable so the stack can run alongside other projects
      # that already use these ports (set DB_HOST_PORT etc. in a root .env).
      - "${DB_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-goapp}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-goapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025" # web UI at http://localhost:8025
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP

  migrate:
    build:
      context: ./backend
      target: migrate
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-goapp}?sslmode=disable
    command: ["up"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend
      target: api
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
      MAIL_DRIVER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:4200"
    environment:
      # The Vite dev server proxies /api to the Go backend over the compose network.
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
      # Read-only access to the OpenAPI contract so `npm run gen:api` can
      # generate the TS client from inside the container (the frontend has no
      # local Node toolchain). Resolves the script's ../backend/api path.
      - ./backend/api/openapi.yaml:/backend/api/openapi.yaml:ro
    depends_on:
      - api

volumes:
  db-data:
